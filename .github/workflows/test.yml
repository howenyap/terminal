name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1.2"
          gleam-version: "1.14.0"
          rebar3-version: "3"
      - run: gleam deps download
      - name: Test app
        run: gleam test
      - name: Test cache package
        working-directory: packages/cache
        run: |
          gleam deps download
          gleam test
      - name: Test single_flight package
        working-directory: packages/single_flight
        run: |
          gleam deps download
          gleam test
      - run: gleam format --check src test packages
